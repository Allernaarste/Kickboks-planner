<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Glove shape - left -->
  <ellipse cx="200" cy="230" rx="75" ry="90" fill="#ff6b35"/>
  <ellipse cx="200" cy="210" rx="65" ry="70" fill="#ff8c5a"/>
  <!-- Glove shape - right -->
  <ellipse cx="312" cy="230" rx="75" ry="90" fill="#e05c28"/>
  <ellipse cx="312" cy="210" rx="65" ry="70" fill="#ff6b35"/>
  <!-- Thumb left -->
  <ellipse cx="255" cy="190" rx="30" ry="18" fill="#ff6b35" transform="rotate(-15 255 190)"/>
  <!-- Wrist band -->
  <rect x="125" y="290" width="150" height="45" rx="10" fill="#cc4f1f"/>
  <rect x="237" y="290" width="150" height="45" rx="10" fill="#b8451a"/>
  <!-- K letter -->
  <text x="256" y="430" font-size="72" font-weight="900" text-anchor="middle" fill="#ff6b35" font-family="-apple-system,BlinkMacSystemFont,sans-serif" opacity="0.9">PLANNER</text>
</svg>
