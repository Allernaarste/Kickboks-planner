name: Update Schedules

on:
  schedule:
    - cron: '0 4 * * 1'   # elke maandag om 04:00 UTC
  workflow_dispatch:        # handmatig starten via GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch schedules
        run: node scripts/fetch-schedules.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedules.json
          git diff --cached --quiet || git commit -m "Automatische roosterupdate $(date -u +%Y-%m-%d)"
          git push
