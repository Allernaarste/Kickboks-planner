<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kickboks">
<meta name="theme-color" content="#000000">
<title>Kickboks Planner Utrecht</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --bg:      #000;
  --bg2:     #1c1c1e;
  --bg3:     #2c2c2e;
  --bg4:     #3a3a3c;
  --f1:      rgba(255,255,255,.08);
  --f2:      rgba(255,255,255,.13);
  --sep:     rgba(255,255,255,.13);
  --l1:      #fff;
  --l2:      rgba(235,235,245,.6);
  --l3:      rgba(235,235,245,.3);
  --orange:  #ff9500;
  --green:   #30d158;
  --red:     #ff453a;
  --blue:    #0a84ff;
  --col:     #ff453a;
  --sb:      #0a84ff;
  --com:     #30d158;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--l1);
  min-height:100%;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}

/* ── PULL-TO-REFRESH ── */
#ptr{
  position:fixed;top:calc(env(safe-area-inset-top)+8px);left:50%;
  transform:translateX(-50%) translateY(-64px);
  width:36px;height:36px;border-radius:50%;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  z-index:600;box-shadow:0 2px 12px rgba(0,0,0,.5);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  font-size:18px;
}
#ptr.show{transform:translateX(-50%) translateY(0)}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:400;
  padding:calc(env(safe-area-inset-top)+12px) 18px 10px;
  background:rgba(0,0,0,.82);
  backdrop-filter:saturate(180%) blur(22px);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;gap:10px;
}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hdr-title b{color:var(--orange);font-weight:700}
.hdr-sub{font-size:11px;color:var(--l3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--f1);color:var(--orange);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:17px;
  transition:background .15s;
}
.hdr-btn:active{background:var(--f2)}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr-btn.spinning{animation:spin .7s linear infinite}

/* ── SCHOOL CHIPS ── */
.chips{
  display:flex;gap:6px;padding:10px 16px 8px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:.5px solid var(--sep);
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;
  background:var(--f1);color:var(--l2);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s,color .15s;
}
.chip:active{opacity:.7}
.chip.on             {background:var(--orange);color:#fff}
.chip.on[data-s=col] {background:var(--col)}
.chip.on[data-s=sb]  {background:var(--sb)}
.chip.on[data-s=com] {background:var(--com);color:#000}

/* ── WEEK LABEL ── */
.wk-label{
  padding:6px 16px 0;
  font-size:11px;font-weight:600;letter-spacing:.4px;
  text-transform:uppercase;color:var(--l3);
}

/* ── DAY ROW ── */
.day-row{
  display:flex;align-items:center;gap:2px;
  padding:4px 8px 10px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:.5px solid var(--sep);
}
.day-row::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;min-width:44px;border:none;background:transparent;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:2px 2px 6px;
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--l3);position:relative;
}
.day-circle{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:500;color:var(--l2);
  transition:background .15s,color .15s;
}
.day-btn.today .day-circle{color:var(--orange);font-weight:700}
.day-btn.sel   .day-circle{background:var(--orange);color:#fff;font-weight:700}
.day-btn.past{opacity:.32}
.day-btn.dot::after{
  content:'';position:absolute;bottom:1px;
  width:4px;height:4px;border-radius:50%;background:var(--green);
}
.day-btn.sel.dot::after{background:rgba(255,255,255,.7)}
.wk-nav{
  flex-shrink:0;width:28px;height:44px;border:none;background:transparent;
  color:var(--orange);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.wk-nav.off{opacity:.18;pointer-events:none}

/* ── CONTENT ── */
.content{padding:12px 16px 0;max-width:580px;margin:0 auto}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px}
.empty .ei{font-size:52px;margin-bottom:14px}
.empty .em{font-size:17px;font-weight:600;color:var(--l2);margin-bottom:6px}
.empty .es{font-size:15px;color:var(--l3);line-height:1.5}

/* ── CARD ── */
.card{
  background:var(--bg2);border-radius:16px;
  padding:14px 16px 12px;margin-bottom:10px;
  transition:transform .1s;
}
.card:active{transform:scale(.975)}
.card.sel{
  background:rgba(48,209,88,.08);
  outline:1.5px solid rgba(48,209,88,.28);
}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.school-tag{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--l2);
}
.school-dot{width:8px;height:8px;border-radius:50%}
.d-col{background:var(--col)} .d-sb{background:var(--sb)} .d-com{background:var(--com)}
.time-tag{text-align:right}
.time-tag .t{font-size:18px;font-weight:700;line-height:1}
.time-tag .d{font-size:11px;color:var(--l3)}
.card-name{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.card-lvl{font-size:13px;color:var(--l3);margin-bottom:12px}
.card-btns{display:flex;gap:8px}
.btn{
  flex:1;padding:10px 8px;border-radius:11px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:opacity .15s;
}
.btn:active{opacity:.7}
.btn-sel{background:var(--f2);color:var(--l2)}
.btn-sel.on{background:var(--green);color:#000}
.btn-cal{background:var(--f1);color:var(--l3);flex:0 0 auto;padding:10px 14px}

/* ── BOTTOM NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(18,18,18,.88);
  backdrop-filter:saturate(180%) blur(22px);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  border-top:.5px solid rgba(255,255,255,.11);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;padding:10px 8px 8px;border:none;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--l3);font-size:10px;font-weight:500;cursor:pointer;
  position:relative;transition:color .2s;
}
.nav-ico{font-size:23px;line-height:1;transition:transform .15s}
.nav-btn.on{color:var(--orange)}
.nav-btn.on .nav-ico{transform:scale(1.1)}
.nbadge{
  position:absolute;top:7px;right:calc(50% - 21px);
  background:var(--red);color:#fff;
  font-size:10px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;
  display:none;align-items:center;justify-content:center;padding:0 4px;
}

/* ── PLANNING VIEW ── */
.plan-hdr{
  position:sticky;top:0;z-index:400;
  padding:calc(env(safe-area-inset-top)+12px) 18px 10px;
  background:rgba(0,0,0,.82);
  backdrop-filter:saturate(180%) blur(22px);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  border-bottom:.5px solid var(--sep);
  display:flex;align-items:flex-end;justify-content:space-between;
}
.plan-hdr h2{font-size:26px;font-weight:700;letter-spacing:-.5px}
.plan-hdr p{font-size:13px;color:var(--l3);margin-top:1px}

/* Stats */
.stats{display:flex;gap:10px;padding:14px 16px 4px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{
  flex-shrink:0;background:var(--bg2);border-radius:14px;
  padding:11px 14px;min-width:90px;
}
.stat .sv{font-size:24px;font-weight:700;color:var(--orange)}
.stat .sl{font-size:11px;color:var(--l3);margin-top:1px;font-weight:500}

/* Sync */
.sync{
  margin:8px 16px;background:var(--bg2);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;
}
.sync-txt{flex:1}
.sync-txt strong{font-size:13px;font-weight:600;display:block}
.sync-txt span{font-size:11px;color:var(--l3)}
.btn-share{
  padding:8px 14px;background:var(--orange);color:#fff;
  border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;
}
.btn-share:active{opacity:.8}

/* Day sections in plan */
.day-sec{max-width:580px;margin:0 auto;padding:0 16px 4px}
.day-lbl{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--l3);padding:14px 0 8px;
}

/* School links */
.school-links{margin:8px 16px 16px;background:var(--bg2);border-radius:14px;overflow:hidden}
.sl-item{
  display:flex;align-items:center;gap:10px;
  padding:13px 14px;text-decoration:none;color:var(--l1);
  border-bottom:.5px solid rgba(255,255,255,.05);
}
.sl-item:last-child{border-bottom:none}
.sl-item:active{background:var(--f1)}
.sl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sl-name{flex:1;font-size:15px;font-weight:500}
.sl-arr{color:var(--l3);font-size:17px}

/* ── TOAST ── */
.toast{
  position:fixed;
  bottom:calc(88px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--bg3);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:var(--l1);padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:500;opacity:0;
  transition:opacity .22s,transform .22s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;z-index:999;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="ptr">↻</div>
<div class="toast" id="toast"></div>

<!-- ═══ ROOSTER ═══ -->
<div id="v-rooster">
  <header class="hdr">
    <div class="hdr-text">
      <div class="hdr-title">Kickboks <b>Planner</b></div>
      <div class="hdr-sub" id="hdrSub">The Colosseum · SB Gym · Commit</div>
    </div>
    <button class="hdr-btn" id="refreshBtn" onclick="doRefresh()" title="Ververs rooster">↻</button>
  </header>

  <div class="chips" id="schoolChips">
    <button class="chip on"  data-s="all" onclick="setSchool('all',this)">Alle scholen</button>
    <button class="chip"     data-s="col" onclick="setSchool('col',this)">The Colosseum</button>
    <button class="chip"     data-s="sb"  onclick="setSchool('sb',this)">SB Gym</button>
    <button class="chip"     data-s="com" onclick="setSchool('com',this)">Commit</button>
  </div>

  <div class="wk-label" id="wkLabel"></div>
  <div class="day-row"  id="dayRow"></div>
  <div class="content"  id="classList"></div>
</div>

<!-- ═══ PLANNING ═══ -->
<div id="v-plan" style="display:none">
  <header class="plan-hdr">
    <div>
      <h2>Mijn Planning</h2>
      <p>Geselecteerde trainingen</p>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="sync">
    <div class="sync-txt">
      <strong>Synchroniseer met je andere apparaat</strong>
      <span>Deel via AirDrop of iMessage</span>
    </div>
    <button class="btn-share" onclick="doShare()">Deel</button>
  </div>

  <div id="planList"></div>

  <div style="padding:8px 16px 0;max-width:580px;margin:0 auto">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--l3);padding:8px 0 8px">Roosters bekijken</div>
  </div>
  <div class="school-links">
    <a class="sl-item" href="https://thecolosseum.nl/en/rooster/" target="_blank">
      <div class="sl-dot" style="background:var(--col)"></div>
      <span class="sl-name">The Colosseum</span>
      <span class="sl-arr">›</span>
    </a>
    <a class="sl-item" href="https://sbgym.nl/lesrooster/" target="_blank">
      <div class="sl-dot" style="background:var(--sb)"></div>
      <span class="sl-name">SB Gym</span>
      <span class="sl-arr">›</span>
    </a>
    <a class="sl-item" href="https://www.commit-i-do.com/locaties/rivierenwijk/groepslessen-rivierenwijk/" target="_blank">
      <div class="sl-dot" style="background:var(--com)"></div>
      <span class="sl-name">Commit Rivierenwijk</span>
      <span class="sl-arr">›</span>
    </a>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <button class="nav-btn on" id="nb-r" onclick="showView('rooster')">
    <span class="nav-ico">📅</span>Rooster
  </button>
  <button class="nav-btn" id="nb-p" onclick="showView('plan')">
    <span class="nav-ico">❤️</span>
    <span class="nbadge" id="nbadge">0</span>
    Mijn Planning
  </button>
</nav>

<script>
// ── DATA ─────────────────────────────────────────────────────────
let SCHOOLS = {};
let updatedAt = null;

// Dag 0=Zo 1=Ma 2=Di 3=Wo 4=Do 5=Vr 6=Za
const DS = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
const DF = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const SK = { col:'colosseum', sb:'sbgym', com:'commit' };

// ── STATE ────────────────────────────────────────────────────────
let view      = 'rooster';
let school    = 'all';
let weekOff   = 0;
let day       = (() => { const d = new Date().getDay(); return d === 0 ? 1 : d; })();
let selected  = new Set();

// ── STORAGE ──────────────────────────────────────────────────────
function load()  { try { const s = localStorage.getItem('kbp2'); if(s) selected = new Set(JSON.parse(s)); } catch(e){} }
function save()  { try { localStorage.setItem('kbp2', JSON.stringify([...selected])); } catch(e){} }

// ── LOOKUP ───────────────────────────────────────────────────────
function cls(id) {
  for (const [sk, sc] of Object.entries(SCHOOLS)) {
    const c = sc.classes?.find(x => x.id === id);
    if (c) return { ...c, sk, school: sc };
  }
  return null;
}

// ── WEEK HELPERS ─────────────────────────────────────────────────
function monday(off = weekOff) {
  const t = new Date(); t.setHours(0,0,0,0);
  const dow = t.getDay();
  t.setDate(t.getDate() + (dow === 0 ? -6 : 1 - dow) + off * 7);
  return t;
}

function changeWeek(dir) {
  if (weekOff + dir < 0) return;
  weekOff += dir;
  day = weekOff === 0
    ? (new Date().getDay() || 1)
    : 1;
  renderDays(); renderList();
}

// ── VIEWS ────────────────────────────────────────────────────────
function showView(v) {
  view = v;
  document.getElementById('v-rooster').style.display = v === 'rooster' ? '' : 'none';
  document.getElementById('v-plan').style.display    = v === 'plan'    ? '' : 'none';
  document.getElementById('nb-r').classList.toggle('on', v === 'rooster');
  document.getElementById('nb-p').classList.toggle('on', v === 'plan');
  v === 'plan' ? renderPlan() : renderList();
}

function setSchool(s, btn) {
  school = s;
  document.querySelectorAll('#schoolChips .chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function setDay(d) { day = d; renderDays(); renderList(); }

// ── TOGGLE ───────────────────────────────────────────────────────
function toggle(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  save(); badge(); renderDays(); renderList();
}

// ── BADGE ────────────────────────────────────────────────────────
function badge() {
  const el = document.getElementById('nbadge');
  const n  = selected.size;
  el.textContent = n;
  el.style.display = n ? 'flex' : 'none';
}

// ── RENDER DAYS ──────────────────────────────────────────────────
function renderDays() {
  const mon = monday();
  const now = new Date(); now.setHours(0,0,0,0);
  const dayOrder = [1,2,3,4,5,6,0];

  const cells = dayOrder.map((d, i) => {
    const dt = new Date(mon); dt.setDate(mon.getDate() + i);
    const isToday = dt.getTime() === now.getTime();
    const isPast  = weekOff === 0 && dt < now;
    const hasDot  = [...selected].some(id => { const c = cls(id); return c && c.day === d; });
    const isSel   = d === day;
    return `<button class="day-btn ${isSel?'sel':''} ${isToday?'today':''} ${isPast?'past':''} ${hasDot?'dot':''}"
      onclick="setDay(${d})">
      <div class="day-circle">${dt.getDate()}</div>${DS[d]}
    </button>`;
  }).join('');

  const mon2 = monday(); const sun = new Date(mon2); sun.setDate(mon2.getDate()+6);
  const fmt = d => d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
  const lbl = weekOff === 0 ? 'Deze week' : weekOff === 1 ? 'Volgende week' : `Over ${weekOff} weken`;

  document.getElementById('wkLabel').textContent = `${lbl}  ·  ${fmt(mon2)} – ${fmt(sun)}`;
  document.getElementById('dayRow').innerHTML =
    `<button class="wk-nav ${weekOff===0?'off':''}" onclick="changeWeek(-1)">‹</button>
     ${cells}
     <button class="wk-nav" onclick="changeWeek(1)">›</button>`;
}

// ── RENDER LIST ──────────────────────────────────────────────────
function renderList() {
  const items = [];
  for (const [sk, sc] of Object.entries(SCHOOLS)) {
    if (school !== 'all' && SK[school] !== sk) continue;
    (sc.classes || []).filter(c => c.day === day).forEach(c =>
      items.push({ ...c, sk: Object.keys(SK).find(k => SK[k] === sk), school: sc })
    );
  }
  items.sort((a,b) => a.time.localeCompare(b.time));

  const cont = document.getElementById('classList');
  if (!items.length) {
    cont.innerHTML = `<div class="empty">
      <div class="ei">🥊</div>
      <div class="em">Geen lessen op ${DF[day]}</div>
      <div class="es">Kies een andere dag of school.</div>
    </div>`;
    return;
  }
  cont.innerHTML = items.map(c => cardHTML(c)).join('');
}

// ── CARD HTML ────────────────────────────────────────────────────
function cardHTML(c) {
  const on = selected.has(c.id);
  const label = c.sk === 'col' ? 'The Colosseum' : c.sk === 'sb' ? 'SB Gym' : 'Commit';
  return `<div class="card ${on?'sel':''}">
    <div class="card-top">
      <div class="school-tag">
        <div class="school-dot d-${c.sk}"></div>${label}
      </div>
      <div class="time-tag">
        <div class="t">${c.time}</div>
        <div class="d">${c.dur} min</div>
      </div>
    </div>
    <div class="card-name">${c.type}</div>
    <div class="card-lvl">${c.level || 'Alle niveaus'}</div>
    <div class="card-btns">
      <button class="btn btn-sel ${on?'on':''}" onclick="toggle('${c.id}')">
        ${on ? '✓ Gepland' : '+ Selecteer'}
      </button>
      ${on ? `<button class="btn btn-cal" onclick="toCalendar('${c.id}')">📅 Agenda</button>` : ''}
    </div>
  </div>`;
}

// ── RENDER PLAN ──────────────────────────────────────────────────
function renderPlan() {
  // Stats
  const total = selected.size;
  const days  = new Set([...selected].map(id => cls(id)?.day)).size;
  const schools = new Set([...selected].map(id => cls(id)?.sk).filter(Boolean)).size;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="sv">${total}</div><div class="sl">Trainingen</div></div>
    <div class="stat"><div class="sv">${days}</div><div class="sl">Dagen</div></div>
    <div class="stat"><div class="sv">${schools}</div><div class="sl">Scholen</div></div>`;

  const cont = document.getElementById('planList');
  if (!selected.size) {
    cont.innerHTML = `<div class="empty">
      <div class="ei">🗓️</div>
      <div class="em">Nog niets gepland</div>
      <div class="es">Tik in het Rooster op een training en kies Selecteer.</div>
    </div>`;
    return;
  }

  const byDay = {};
  for (const id of selected) {
    const c = cls(id); if (!c) continue;
    (byDay[c.day] = byDay[c.day] || []).push(c);
  }

  let html = '';
  for (const d of [1,2,3,4,5,6,0]) {
    if (!byDay[d]) continue;
    byDay[d].sort((a,b) => a.time.localeCompare(b.time));
    html += `<div class="day-sec"><div class="day-lbl">${DF[d]}</div>`;
    byDay[d].forEach(c => { html += cardHTML(c); });
    html += '</div>';
  }
  cont.innerHTML = html;
}

// ── ICS ──────────────────────────────────────────────────────────
function toCalendar(id) {
  const c = cls(id); if (!c) return;
  const mon = monday();
  const idx = c.day === 0 ? 6 : c.day - 1;
  const s = new Date(mon); s.setDate(mon.getDate() + idx);
  const [hh, mm] = c.time.split(':').map(Number);
  s.setHours(hh, mm, 0, 0);
  if (s <= new Date()) s.setDate(s.getDate() + 7);
  const e = new Date(s); e.setMinutes(e.getMinutes() + c.dur);

  const p = n => String(n).padStart(2,'0');
  const f = d => `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;

  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//Kickboks Planner Utrecht//NL',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${id}-${Date.now()}@kbp`,
    `DTSTART;TZID=Europe/Amsterdam:${f(s)}`,
    `DTEND;TZID=Europe/Amsterdam:${f(e)}`,
    'RRULE:FREQ=WEEKLY',
    `SUMMARY:${c.type} – ${c.school.name}`,
    `DESCRIPTION:Niveau: ${c.level||'Alle niveaus'}`,
    `LOCATION:${c.school.addr}`,
    'STATUS:CONFIRMED','END:VEVENT','END:VCALENDAR'
  ].join('\r\n');

  const url = URL.createObjectURL(new Blob([ics], { type:'text/calendar;charset=utf-8' }));
  const a = Object.assign(document.createElement('a'), { href:url, download:`${c.type.replace(/\s+/g,'_')}.ics` });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('📅 Agenda-bestand geopend!');
}

// ── SHARE / SYNC ─────────────────────────────────────────────────
function doShare() {
  if (!selected.size) { toast('Selecteer eerst trainingen'); return; }
  const enc = btoa(unescape(encodeURIComponent(JSON.stringify([...selected]))));
  const url = `${location.origin}${location.pathname}#sync=${enc}`;
  if (navigator.share) navigator.share({ title:'Mijn Kickboks Planning', url }).catch(()=>{});
  else if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => toast('🔗 Link gekopieerd!'));
  else prompt('Kopieer deze link:', url);
}

function checkImport() {
  if (!location.hash.startsWith('#sync=')) return;
  const enc = location.hash.slice(6);
  history.replaceState(null, '', location.pathname);
  try {
    const ids = JSON.parse(decodeURIComponent(escape(atob(enc))));
    const ok  = ids.filter(id => cls(id));
    if (!ok.length) return;
    if (confirm(`${ok.length} training(en) importeren?`)) {
      ok.forEach(id => selected.add(id));
      save(); badge(); renderDays();
      toast(`✓ ${ok.length} training(en) geïmporteerd!`);
      showView('plan');
    }
  } catch(e) {}
}

// ── REFRESH ──────────────────────────────────────────────────────
async function loadSchedules() {
  const res = await fetch('./schedules.json?v=' + Date.now());
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  SCHOOLS = data.schools;
  updatedAt = data.updated;
  const d = new Date(updatedAt);
  document.getElementById('hdrSub').textContent =
    `The Colosseum · SB Gym · Commit  ·  ${d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'})}`;
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    await loadSchedules();
    renderList();
    if (view === 'plan') renderPlan();
    toast('✓ Rooster bijgewerkt');
  } catch(e) {
    toast('Geen verbinding');
  }
  btn.classList.remove('spinning');
}

// ── PULL-TO-REFRESH ──────────────────────────────────────────────
let ptY = 0, ptActive = false;
const ptr = document.getElementById('ptr');
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0) ptY = e.touches[0].clientY;
}, { passive:true });
document.addEventListener('touchmove', e => {
  if (!ptY) return;
  if (e.touches[0].clientY - ptY > 65 && !ptActive) {
    ptActive = true; ptr.classList.add('show');
  }
}, { passive:true });
document.addEventListener('touchend', () => {
  if (ptActive) { ptActive = false; ptr.classList.remove('show'); doRefresh(); }
  ptY = 0;
});

// ── TOAST ────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('on'), 2600);
}

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  load();
  document.getElementById('classList').innerHTML =
    '<div class="empty"><div class="ei">⏳</div><div class="em">Rooster ophalen…</div></div>';

  try { await loadSchedules(); } catch(e) { toast('Kon rooster niet laden'); }

  renderDays(); renderList(); badge(); checkImport();

  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}

init();
</script>
