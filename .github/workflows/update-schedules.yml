name: Rooster ophalen

on:
  schedule:
    - cron: '0 4 * * 1'   # Elke maandag 06:00 NL (04:00 UTC)
  workflow_dispatch:        # Handmatig starten via GitHub-knop
  push:
    paths:
      - 'scripts/fetch-schedules.mjs'
      - '.github/workflows/update-schedules.yml'

jobs:
  fetch-schedules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installeer dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install --with-deps chromium

      - name: Haal roosters op
        run: node scripts/fetch-schedules.mjs
        continue-on-error: true

      - name: Upload debug-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rooster-debug
          path: debug-output/
          if-no-files-found: ignore
          retention-days: 14

      - name: Sla rooster op in git
        if: github.event_name != 'pull_request'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add schedules.json
          git diff --staged --quiet || git commit -m "Rooster bijgewerkt $(date -u '+%d-%m-%Y')"
          git push
