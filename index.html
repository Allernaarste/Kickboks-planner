<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kickboks">
  <meta name="theme-color" content="#0d0d1a">
  <title>Kickboks Planner Utrecht</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --bg:   #0d0d1a;
      --bg2:  #151528;
      --bg3:  #1e1e38;
      --bg4:  #25253f;
      --accent:  #ff6b35;
      --accent2: #ff8c5a;
      --text:  #f0f0ff;
      --text2: #9898c0;
      --text3: #55557a;
      --green: #4ecca3;
      --c-col: #e63946;
      --c-sb:  #4361ee;
      --c-com: #4cc9a3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      /* Room for bottom nav + iOS home-indicator */
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: calc(14px + env(safe-area-inset-top)) 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .header h1 { font-size: 21px; font-weight: 800; letter-spacing: -.5px; }
    .header h1 span { color: var(--accent); }
    .header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* ── FILTER CHIPS ── */
    .filter-row {
      background: var(--bg2);
      padding: 8px 14px 10px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.12);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: .18s;
    }
    .chip.active                { background: var(--accent);  border-color: var(--accent);  color: #fff; }
    .chip[data-s=colosseum].active { background: var(--c-col); border-color: var(--c-col); }
    .chip[data-s=sbgym].active     { background: var(--c-sb);  border-color: var(--c-sb);  }
    .chip[data-s=commit].active    { background: var(--c-com); border-color: var(--c-com); color: #000; }

    /* ── DAY TABS ── */
    .day-row {
      background: var(--bg2);
      padding: 6px 14px 8px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .day-row::-webkit-scrollbar { display: none; }
    .day-btn {
      flex-shrink: 0;
      min-width: 46px;
      padding: 7px 8px;
      border-radius: 11px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      position: relative;
      transition: .18s;
    }
    .day-btn .day-num {
      font-size: 18px;
      font-weight: 800;
      color: var(--text2);
      line-height: 1;
    }
    .day-btn.active            { background: var(--accent); color: #fff; }
    .day-btn.active .day-num   { color: #fff; }
    /* dot = has selection on that day */
    .day-btn.dot::after {
      content: '';
      position: absolute;
      bottom: 3px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
    }
    .day-btn.active.dot::after { background: #fff; }

    /* ── CONTENT AREA ── */
    .content {
      padding: 14px 14px 0;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--text3);
    }
    .empty .ico  { font-size: 52px; margin-bottom: 14px; }
    .empty .msg  { font-size: 15px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
    .empty .sub  { font-size: 13px; line-height: 1.5; }

    /* ── CLASS CARD ── */
    .card {
      background: var(--bg3);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.05);
      padding: 14px 14px 12px;
      margin-bottom: 11px;
      position: relative;
      overflow: hidden;
      transition: transform .12s;
    }
    .card:active { transform: scale(.985); }
    /* Left accent stripe */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3.5px;
      border-radius: 3px 0 0 3px;
    }
    .card.colosseum::before { background: var(--c-col); }
    .card.sbgym::before     { background: var(--c-sb); }
    .card.commit::before    { background: var(--c-com); }
    .card.selected {
      border-color: rgba(255,107,53,.35);
      background: rgba(255,107,53,.07);
    }

    /* card top row */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .badge {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .badge-colosseum { background: rgba(230,57,70,.18);  color: #ff7a84; }
    .badge-sbgym     { background: rgba(67,97,238,.18);  color: #7a92f5; }
    .badge-commit    { background: rgba(76,201,163,.18); color: #4cc9a3; }

    .time-block { text-align: right; }
    .time-block .t { font-size: 20px; font-weight: 800; line-height: 1; }
    .time-block .d { font-size: 11px; color: var(--text2); }

    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .card-level {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(255,255,255,.07);
      color: var(--text2);
      margin-bottom: 12px;
    }

    /* action buttons */
    .card-actions { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 11px;
      border: 1.5px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: .15s;
    }
    .btn:active { opacity: .75; }
    .btn-select.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-cal { color: var(--text2); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 300;
      background: rgba(18,18,34,.96);
      backdrop-filter: blur(18px) saturate(1.5);
      -webkit-backdrop-filter: blur(18px) saturate(1.5);
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      padding: 10px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: none;
      color: var(--text3);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: color .2s;
    }
    .nav-btn .ico { font-size: 24px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }
    .n-badge {
      position: absolute;
      top: 6px; right: calc(50% - 22px);
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      min-width: 17px;
      height: 17px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* ── PLANNING VIEW ── */
    .plan-header {
      padding: 20px 16px 4px;
      max-width: 560px;
      margin: 0 auto;
    }
    .plan-header h2 { font-size: 24px; font-weight: 800; }
    .plan-header p  { font-size: 13px; color: var(--text3); margin-top: 3px; }

    .sync-card {
      margin: 12px 14px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(135deg, rgba(255,107,53,.12), rgba(255,107,53,.06));
      border: 1px solid rgba(255,107,53,.28);
      border-radius: 14px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sync-icon { font-size: 26px; }
    .sync-text { flex: 1; }
    .sync-text strong { font-size: 13px; display: block; }
    .sync-text span   { font-size: 11px; color: var(--text2); }
    .btn-share {
      padding: 9px 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-share:active { opacity: .8; }

    .day-section { max-width: 560px; margin: 0 auto; padding: 0 14px 6px; }
    .day-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 16px 0 8px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(82px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(28,28,48,.97);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(14px);
      color: #fff;
      padding: 11px 20px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 400;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════════ -->
<header class="header">
  <div>
    <h1>Kickboks <span>Planner</span></h1>
    <div class="header-sub">The Colosseum &bull; SB Gym &bull; Commit Rivierenwijk</div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════
     ROOSTER VIEW
════════════════════════════════════════════════════════════ -->
<div id="v-rooster">
  <div class="filter-row" id="schoolFilter">
    <button class="chip active" data-s="all"       onclick="setSchool('all',this)">Alle scholen</button>
    <button class="chip"        data-s="colosseum" onclick="setSchool('colosseum',this)">The Colosseum</button>
    <button class="chip"        data-s="sbgym"     onclick="setSchool('sbgym',this)">SB Gym</button>
    <button class="chip"        data-s="commit"    onclick="setSchool('commit',this)">Commit</button>
  </div>
  <div class="day-row" id="dayRow"></div>
  <div class="content" id="classList"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     PLANNING VIEW
════════════════════════════════════════════════════════════ -->
<div id="v-plan" style="display:none">
  <div class="plan-header">
    <h2>Mijn Planning</h2>
    <p>Geselecteerde trainingen deze week</p>
  </div>

  <div class="sync-card">
    <div class="sync-icon">🔗</div>
    <div class="sync-text">
      <strong>Synchroniseer met je andere apparaat</strong>
      <span>Deel een link via AirDrop of iMessage</span>
    </div>
    <button class="btn-share" onclick="shareSync()">Deel</button>
  </div>

  <div id="planList"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     BOTTOM NAV
════════════════════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nb-rooster" onclick="showView('rooster')">
    <span class="ico">📅</span>
    Rooster
  </button>
  <button class="nav-btn" id="nb-plan" onclick="showView('plan')">
    <span class="ico">❤️</span>
    <span class="n-badge" id="badge">0</span>
    Mijn Planning
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════════════
// ROOSTERDATA
// LET OP: dit zijn voorbeeldrooster. Pas de tijden & lessen aan
// naar de actuele roosters van de scholen.
// Dag: 0=Zo 1=Ma 2=Di 3=Wo 4=Do 5=Vr 6=Za
// ═══════════════════════════════════════════════════════════════
const SCHOOLS = {
  colosseum: {
    name: 'The Colosseum',
    addr: 'Utrecht',
    classes: [
      { id:'c01', day:1, time:'18:00', dur:60,  type:'Kickboxen',     level:'Beginners'        },
      { id:'c02', day:1, time:'19:15', dur:60,  type:'Kickboxen',     level:'Gevorderd'        },
      { id:'c03', day:1, time:'20:30', dur:60,  type:'K1 / Sparring', level:'Gevorderd'        },
      { id:'c04', day:2, time:'09:30', dur:60,  type:'Fitness',       level:'Alle niveaus'     },
      { id:'c05', day:2, time:'18:00', dur:60,  type:'Muay Thai',     level:'Beginners'        },
      { id:'c06', day:2, time:'19:15', dur:60,  type:'Kickboxen',     level:'Gevorderd'        },
      { id:'c07', day:3, time:'17:30', dur:45,  type:'Kids Kickboxen',level:'Jeugd (8–14 jr)'  },
      { id:'c08', day:3, time:'18:30', dur:60,  type:'Kickboxen',     level:'Beginners'        },
      { id:'c09', day:3, time:'20:00', dur:60,  type:'K1 / Sparring', level:'Gevorderd'        },
      { id:'c10', day:4, time:'09:30', dur:60,  type:'Fitness',       level:'Alle niveaus'     },
      { id:'c11', day:4, time:'18:00', dur:60,  type:'Muay Thai',     level:'Alle niveaus'     },
      { id:'c12', day:4, time:'19:15', dur:60,  type:'Kickboxen',     level:'Gevorderd'        },
      { id:'c13', day:5, time:'18:00', dur:60,  type:'Kickboxen',     level:'Beginners'        },
      { id:'c14', day:5, time:'19:15', dur:60,  type:'Vrij Sparring', level:'Gevorderd'        },
      { id:'c15', day:6, time:'10:00', dur:90,  type:'Open Mat',      level:'Alle niveaus'     },
      { id:'c16', day:6, time:'12:00', dur:60,  type:'Kickboxen',     level:'Beginners'        },
    ]
  },
  sbgym: {
    name: 'SB Gym',
    addr: 'Utrecht',
    classes: [
      { id:'s01', day:1, time:'09:00', dur:60,  type:'Ochtend Kickboxen', level:'Alle niveaus' },
      { id:'s02', day:1, time:'18:00', dur:60,  type:'Kickboxen',         level:'Beginners'    },
      { id:'s03', day:1, time:'19:15', dur:60,  type:'Boksen',            level:'Alle niveaus' },
      { id:'s04', day:1, time:'20:30', dur:60,  type:'Kickboxen',         level:'Gevorderd'    },
      { id:'s05', day:2, time:'18:00', dur:60,  type:'Muay Thai',         level:'Alle niveaus' },
      { id:'s06', day:2, time:'19:15', dur:60,  type:'Kickboxen',         level:'Beginners'    },
      { id:'s07', day:3, time:'09:00', dur:60,  type:'Ochtend Training',  level:'Alle niveaus' },
      { id:'s08', day:3, time:'17:30', dur:45,  type:'Kids Boxing',       level:'Jeugd'        },
      { id:'s09', day:3, time:'18:30', dur:60,  type:'Kickboxen',         level:'Beginners'    },
      { id:'s10', day:3, time:'19:45', dur:60,  type:'Kickboxen',         level:'Gevorderd'    },
      { id:'s11', day:4, time:'18:00', dur:60,  type:'Boksen',            level:'Alle niveaus' },
      { id:'s12', day:4, time:'19:15', dur:60,  type:'Kickboxen',         level:'Beginners'    },
      { id:'s13', day:4, time:'20:30', dur:60,  type:'Sparring',          level:'Gevorderd'    },
      { id:'s14', day:5, time:'12:00', dur:60,  type:'Middag Training',   level:'Alle niveaus' },
      { id:'s15', day:5, time:'18:00', dur:60,  type:'Kickboxen',         level:'Beginners'    },
      { id:'s16', day:6, time:'10:00', dur:90,  type:'Weekend Training',  level:'Alle niveaus' },
    ]
  },
  commit: {
    name: 'Commit Rivierenwijk',
    addr: 'Rivierenwijk, Utrecht',
    classes: [
      { id:'m01', day:1, time:'19:00', dur:60,  type:'Kickboxen',      level:'Alle niveaus' },
      { id:'m02', day:2, time:'20:00', dur:60,  type:'Boksen Fitness', level:'Alle niveaus' },
      { id:'m03', day:3, time:'10:00', dur:60,  type:'Kick & Box Fit', level:'Alle niveaus' },
      { id:'m04', day:3, time:'19:00', dur:60,  type:'Kickboxen',      level:'Alle niveaus' },
      { id:'m05', day:4, time:'19:30', dur:60,  type:'Kick & Box Fit', level:'Alle niveaus' },
      { id:'m06', day:6, time:'10:00', dur:75,  type:'Kickboxen',      level:'Alle niveaus' },
    ]
  }
};

const DAYS_SHORT = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
const DAYS_FULL  = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

// ── STATE ──────────────────────────────────────────────────────
let activeView    = 'rooster';
let activeSchool  = 'all';
let activeDay     = (() => { const d = new Date().getDay(); return d === 0 ? 1 : d; })();
let selected      = new Set();

function loadState() {
  try { const s = localStorage.getItem('kbp_sel'); if (s) selected = new Set(JSON.parse(s)); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('kbp_sel', JSON.stringify([...selected])); } catch(e) {}
}

// ── LOOKUP ────────────────────────────────────────────────────
function getClass(id) {
  for (const [key, sc] of Object.entries(SCHOOLS)) {
    const cls = sc.classes.find(c => c.id === id);
    if (cls) return { ...cls, sk: key, school: SCHOOLS[key] };
  }
  return null;
}

// ── VIEW SWITCH ───────────────────────────────────────────────
function showView(v) {
  activeView = v;
  document.getElementById('v-rooster').style.display = v === 'rooster' ? '' : 'none';
  document.getElementById('v-plan').style.display    = v === 'plan'    ? '' : 'none';
  document.getElementById('nb-rooster').classList.toggle('active', v === 'rooster');
  document.getElementById('nb-plan').classList.toggle('active',    v === 'plan');
  if (v === 'plan') renderPlan(); else renderList();
}

// ── SCHOOL FILTER ─────────────────────────────────────────────
function setSchool(key, btn) {
  activeSchool = key;
  document.querySelectorAll('#schoolFilter .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── DAY SELECT ────────────────────────────────────────────────
function selectDay(d) {
  activeDay = d;
  renderDayRow();
  renderList();
}

// ── TOGGLE CLASS ─────────────────────────────────────────────
function toggle(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  saveState();
  updateBadge();
  renderDayRow();   // refresh dots
  renderList();     // refresh cards
}

// ── BADGE ────────────────────────────────────────────────────
function updateBadge() {
  const el = document.getElementById('badge');
  const n  = selected.size;
  el.textContent = n;
  el.style.display = n ? 'flex' : 'none';
}

// ── DAY ROW ──────────────────────────────────────────────────
function renderDayRow() {
  const today = new Date();
  const todayDow = today.getDay();

  // Show Mon–Sat (days 1–6)
  const html = [1,2,3,4,5,6].map(d => {
    const diff = d - todayDow;
    const dt = new Date(today);
    dt.setDate(today.getDate() + diff);
    const hasDot = [...selected].some(id => { const c = getClass(id); return c && c.day === d; });
    return `<button class="day-btn ${d===activeDay?'active':''} ${hasDot?'dot':''}"
                    onclick="selectDay(${d})">
              <span class="day-num">${dt.getDate()}</span>${DAYS_SHORT[d]}
            </button>`;
  }).join('');
  document.getElementById('dayRow').innerHTML = html;
}

// ── CLASS LIST ────────────────────────────────────────────────
function renderList() {
  const out = [];
  for (const [key, sc] of Object.entries(SCHOOLS)) {
    if (activeSchool !== 'all' && activeSchool !== key) continue;
    sc.classes.filter(c => c.day === activeDay).forEach(c => {
      out.push({ ...c, sk: key, schoolName: sc.name, addr: sc.addr });
    });
  }
  out.sort((a,b) => a.time.localeCompare(b.time));

  const cont = document.getElementById('classList');
  if (!out.length) {
    cont.innerHTML = `<div class="empty">
      <div class="ico">🥊</div>
      <div class="msg">Geen lessen op ${DAYS_FULL[activeDay]}</div>
      <div class="sub">Kies een andere dag of school hierboven.</div>
    </div>`;
    return;
  }
  cont.innerHTML = out.map(c => cardHTML(c, c.sk)).join('');
}

// ── PLANNING LIST ─────────────────────────────────────────────
function renderPlan() {
  const cont = document.getElementById('planList');
  if (!selected.size) {
    cont.innerHTML = `<div class="empty" style="margin-top:20px">
      <div class="ico">🗓️</div>
      <div class="msg">Nog geen trainingen gepland</div>
      <div class="sub">Ga naar het Rooster, tik op een training en kies Selecteer.</div>
    </div>`;
    return;
  }

  // Group by day
  const byDay = {};
  for (const id of selected) {
    const c = getClass(id);
    if (!c) continue;
    (byDay[c.day] = byDay[c.day] || []).push(c);
  }

  let html = '';
  for (const d of [1,2,3,4,5,6,0]) {
    if (!byDay[d]) continue;
    byDay[d].sort((a,b) => a.time.localeCompare(b.time));
    html += `<div class="day-section"><div class="day-label">${DAYS_FULL[d]}</div>`;
    byDay[d].forEach(c => { html += cardHTML({ ...c, schoolName: c.school.name, addr: c.school.addr }, c.sk); });
    html += '</div>';
  }
  cont.innerHTML = html;
}

// ── CARD HTML ────────────────────────────────────────────────
function cardHTML(cls, sk) {
  const on = selected.has(cls.id);
  const schoolLabel = sk === 'colosseum' ? 'The Colosseum' : sk === 'sbgym' ? 'SB Gym' : 'Commit';
  return `
  <div class="card ${sk} ${on?'selected':''}">
    <div class="card-top">
      <span class="badge badge-${sk}">${schoolLabel}</span>
      <div class="time-block">
        <div class="t">${cls.time}</div>
        <div class="d">${cls.dur} min</div>
      </div>
    </div>
    <div class="card-name">${cls.type}</div>
    <div class="card-level">${cls.level||'Alle niveaus'}</div>
    <div class="card-actions">
      <button class="btn btn-select ${on?'on':''}" onclick="toggle('${cls.id}')">
        ${on ? '✓ Gepland' : '+ Selecteer'}
      </button>
      ${on ? `<button class="btn btn-cal" onclick="toCalendar('${cls.id}')">📅 Agenda</button>` : ''}
    </div>
  </div>`;
}

// ── ICS CALENDAR ─────────────────────────────────────────────
function toCalendar(id) {
  const c = getClass(id);
  if (!c) return;

  // Next occurrence of this weekday
  const now = new Date();
  let diff = c.day - now.getDay();
  if (diff < 0) diff += 7;
  if (diff === 0) {
    const [hh, mm] = c.time.split(':').map(Number);
    if (now.getHours() * 60 + now.getMinutes() >= hh * 60 + mm) diff = 7;
  }

  const start = new Date(now);
  start.setDate(now.getDate() + diff);
  const [hh, mm] = c.time.split(':').map(Number);
  start.setHours(hh, mm, 0, 0);

  const end = new Date(start);
  end.setMinutes(end.getMinutes() + c.dur);

  const p = n => String(n).padStart(2, '0');
  const fmt = d =>
    `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Kickboks Planner Utrecht//NL',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${id}-${Date.now()}@kickboksplanner`,
    `DTSTART;TZID=Europe/Amsterdam:${fmt(start)}`,
    `DTEND;TZID=Europe/Amsterdam:${fmt(end)}`,
    'RRULE:FREQ=WEEKLY',
    `SUMMARY:${c.type} – ${c.school.name}`,
    `DESCRIPTION:Niveau: ${c.level||'Alle niveaus'}\\nSchool: ${c.school.name}`,
    `LOCATION:${c.school.addr}`,
    'STATUS:CONFIRMED',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `${c.type.replace(/\s+/g,'_')}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('📅 Agenda-bestand geopend!');
}

// ── SYNC / SHARE ──────────────────────────────────────────────
function shareSync() {
  if (!selected.size) { toast('Selecteer eerst trainingen in het rooster'); return; }

  const data    = JSON.stringify([...selected]);
  const encoded = btoa(unescape(encodeURIComponent(data)));
  const url     = `${location.origin}${location.pathname}#sync=${encoded}`;

  if (navigator.share) {
    navigator.share({ title: 'Mijn Kickboks Planning', url }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('🔗 Link gekopieerd! Plak in Safari op je andere apparaat.'));
  } else {
    prompt('Kopieer deze link en open hem op je andere apparaat:', url);
  }
}

function checkImport() {
  if (!location.hash.startsWith('#sync=')) return;
  const encoded = location.hash.slice(6);
  history.replaceState(null, '', location.pathname);
  try {
    const ids   = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    const valid = ids.filter(id => getClass(id));
    if (!valid.length) return;
    if (confirm(`${valid.length} training(en) importeren in je planning?`)) {
      valid.forEach(id => selected.add(id));
      saveState();
      updateBadge();
      renderDayRow();
      toast(`✓ ${valid.length} training(en) geïmporteerd!`);
      showView('plan');
    }
  } catch(e) { console.error('Import fout', e); }
}

// ── TOAST ─────────────────────────────────────────────────────
let _tTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => el.classList.remove('on'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────
function init() {
  loadState();
  renderDayRow();
  renderList();
  updateBadge();
  checkImport();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
  }
}

init();
</script>
